# Default values for sd-customer-event-history (BIAN Service Domain: Customer Event History)

image:
  repository: bian/sd-customer-event-history
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

# Namespace is set per BIAN business area by deploy-all.sh (helm -n <ns>).
# These labels ride on every object for mesh policy + observability slicing.
bian:
  serviceDomain: "customer-event-history"
  businessArea: "sales-and-service"
  businessDomain: "customer-management"
  functionalPattern: "maintain"

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi

# Gateway API route (Cilium implements Gateway API natively — no ingress controller)
route:
  enabled: true
  gatewayName: bian-gateway
  gatewayNamespace: bian-system
  # External path prefix; rewritten to / before hitting the service
  pathPrefix: /sd-customer-event-history

# CiliumNetworkPolicy — default-deny posture, explicit allows
networkPolicy:
  enabled: true
  monitoringNamespace: monitoring

# Runtime wiring (Phase 2d gates): activate Spring profiles / inject env.
#   springProfiles: "postgres,kafka"
#   extraEnv:
#     - { name: BIAN_DB_URL, value: "jdbc:postgresql://pg-<repo>:5432/<db>" }
springProfiles: ""
extraEnv: []
